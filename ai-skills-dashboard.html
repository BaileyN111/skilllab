<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AI Skills">
<meta name="theme-color" content="#0a0a0f">
<title>AI Skills Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --accent3: #f59e0b;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --stage-0: #3b3b5c;
    --stage-1: #7c3aed;
    --stage-2: #06b6d4;
    --stage-3: #10b981;
    --stage-4: #f59e0b;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
    padding-bottom: calc(80px + var(--safe-bottom));
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    padding: calc(var(--safe-top) + 16px) 20px 14px;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-mark {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: white;
  }

  .logo-text {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--accent2); }

  .add-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
  }

  .add-btn:active { transform: scale(0.9); background: var(--accent); color: white; }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 10px;
    padding: 16px 20px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .stats-bar::-webkit-scrollbar { display: none; }

  .stat-chip {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 100px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
  }

  .stat-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
  }

  /* Stage filter tabs */
  .filter-tabs {
    display: flex;
    gap: 8px;
    padding: 0 20px 16px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .tab.active {
    background: var(--surface);
    color: var(--text);
    border-color: var(--accent);
  }

  /* Cards grid */
  .cards {
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.3s ease forwards;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 16px 16px 0 0;
  }

  .card[data-stage="0"]::before { background: var(--stage-0); }
  .card[data-stage="1"]::before { background: var(--stage-1); }
  .card[data-stage="2"]::before { background: linear-gradient(90deg, var(--stage-1), var(--stage-2)); }
  .card[data-stage="3"]::before { background: linear-gradient(90deg, var(--stage-2), var(--stage-3)); }
  .card[data-stage="4"]::before { background: linear-gradient(90deg, var(--stage-3), var(--stage-4)); }

  .card:active { transform: scale(0.98); }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .card-title {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.2;
    flex: 1;
    padding-right: 10px;
  }

  .stage-badge {
    flex-shrink: 0;
    padding: 3px 10px;
    border-radius: 100px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .card[data-stage="0"] .stage-badge { background: rgba(59,59,92,0.4); color: #9898c0; border: 1px solid #3b3b5c; }
  .card[data-stage="1"] .stage-badge { background: rgba(124,58,237,0.2); color: #a78bfa; border: 1px solid rgba(124,58,237,0.4); }
  .card[data-stage="2"] .stage-badge { background: rgba(6,182,212,0.15); color: #67e8f9; border: 1px solid rgba(6,182,212,0.3); }
  .card[data-stage="3"] .stage-badge { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }
  .card[data-stage="4"] .stage-badge { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }

  .card-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 12px;
    font-weight: 400;
  }

  /* Pipeline track */
  .pipeline {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 12px;
  }

  .pipe-step {
    flex: 1;
    height: 4px;
    border-radius: 0;
    background: var(--border);
    position: relative;
    transition: background 0.3s;
  }

  .pipe-step:first-child { border-radius: 4px 0 0 4px; }
  .pipe-step:last-child { border-radius: 0 4px 4px 0; }

  .pipe-step.done { background: var(--stage-3); }
  .pipe-step.active { background: var(--accent2); animation: pulse 2s infinite; }
  .pipe-step.in-progress { background: var(--accent); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .pipe-dot {
    width: 3px;
    flex-shrink: 0;
    height: 4px;
    background: var(--bg);
  }

  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .tags {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .tag {
    padding: 2px 8px;
    background: rgba(255,255,255,0.05);
    border-radius: 4px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.3px;
  }

  .card-date {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
  .empty p { font-size: 13px; line-height: 1.6; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    width: 100%;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 20px 20px calc(20px + var(--safe-bottom));
    border-top: 1px solid var(--border);
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-height: 90dvh;
    overflow-y: auto;
  }

  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-title {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 20px;
    letter-spacing: -0.5px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    display: block;
    font-family: 'Space Mono', monospace;
  }

  .form-input, .form-textarea, .form-select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .form-input:focus, .form-textarea:focus, .form-select:focus {
    border-color: var(--accent);
  }

  .form-textarea { min-height: 80px; resize: none; }

  /* Stage selector */
  .stage-select {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }

  .stage-opt {
    padding: 8px 4px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 10px;
    font-weight: 700;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.3px;
    line-height: 1.3;
  }

  .stage-opt.selected { border-color: currentColor; }
  .stage-opt[data-s="0"].selected { color: #9898c0; background: rgba(59,59,92,0.2); }
  .stage-opt[data-s="1"].selected { color: #a78bfa; background: rgba(124,58,237,0.15); }
  .stage-opt[data-s="2"].selected { color: #67e8f9; background: rgba(6,182,212,0.12); }
  .stage-opt[data-s="3"].selected { color: #6ee7b7; background: rgba(16,185,129,0.12); }
  .stage-opt[data-s="4"].selected { color: #fcd34d; background: rgba(245,158,11,0.12); }

  .tags-input {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    min-height: 44px;
    cursor: text;
  }

  .tag-pill {
    background: rgba(124,58,237,0.2);
    border: 1px solid rgba(124,58,237,0.4);
    color: #a78bfa;
    padding: 2px 8px;
    border-radius: 100px;
    font-size: 12px;
    display: flex; align-items: center; gap: 4px;
  }

  .tag-pill button {
    background: none; border: none; color: inherit;
    cursor: pointer; font-size: 14px; padding: 0; line-height: 1;
  }

  .tag-input-field {
    background: none; border: none; outline: none;
    color: var(--text); font-family: 'Syne', sans-serif;
    font-size: 13px; min-width: 80px; flex: 1;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #6d28d9);
    color: white;
  }

  .btn-secondary {
    background: var(--bg);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-danger {
    background: rgba(239,68,68,0.15);
    color: #f87171;
    border: 1px solid rgba(239,68,68,0.3);
  }

  /* Detail modal extras */
  .detail-stage-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .stage-advance-btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1.5px solid var(--accent);
    background: rgba(124,58,237,0.15);
    color: #a78bfa;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .stage-advance-btn:active { transform: scale(0.97); }
  .stage-advance-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .stage-regress-btn {
    padding: 10px 14px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .pipeline-detail {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 20px;
  }

  .pipe-detail-step {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    transition: all 0.2s;
  }

  .pipe-detail-step.done { border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.05); }
  .pipe-detail-step.current { border-color: var(--accent); background: rgba(124,58,237,0.08); }

  .pipe-icon {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    background: var(--surface);
  }

  .pipe-detail-step.done .pipe-icon { background: rgba(16,185,129,0.2); }
  .pipe-detail-step.current .pipe-icon { background: rgba(124,58,237,0.25); }

  .pipe-step-name {
    font-size: 13px;
    font-weight: 600;
  }

  .pipe-step-status {
    margin-left: auto;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .pipe-detail-step.done .pipe-step-status { color: #6ee7b7; }
  .pipe-detail-step.current .pipe-step-status { color: #a78bfa; }

  /* Notes */
  .notes-section { margin-top: 16px; }
  .notes-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 8px;
  }

  .notes-display {
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    min-height: 60px;
    white-space: pre-wrap;
  }

  /* Section header */
  .section-header {
    padding: 8px 20px 8px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-mark">AI</div>
      <div class="logo-text">SKILL<span>LAB</span></div>
    </div>
    <button class="add-btn" onclick="openAddModal()">+</button>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="filter-tabs" id="filterTabs"></div>

<div class="section-header" id="sectionHeader"></div>

<div class="cards" id="cardsContainer"></div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="addModal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">New Skill / Project</div>

    <div class="form-group">
      <label class="form-label">Name</label>
      <input class="form-input" id="inputName" placeholder="e.g. RAG Pipeline Builder" maxlength="60">
    </div>

    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="inputDesc" placeholder="What are you building or learning?"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Stage</label>
      <div class="stage-select" id="stageSelect">
        <button class="stage-opt" data-s="0">💡 Idea</button>
        <button class="stage-opt" data-s="1">🔨 Build</button>
        <button class="stage-opt" data-s="2">🔗 Integrate</button>
        <button class="stage-opt" data-s="3">🧪 Test</button>
        <button class="stage-opt" data-s="4">✨ Refine</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Tags (press Enter or comma)</label>
      <div class="tags-input" id="tagsContainer" onclick="document.getElementById('tagField').focus()">
        <input class="tag-input-field" id="tagField" placeholder="python, llm, agents…" maxlength="20">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea class="form-textarea" id="inputNotes" placeholder="Links, ideas, references…"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveProject()">Save</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>

    <div class="card-top" style="margin-bottom:12px">
      <div class="modal-title" id="detailTitle" style="margin-bottom:0;font-size:22px;flex:1;padding-right:10px"></div>
      <div class="stage-badge" id="detailBadge"></div>
    </div>

    <p id="detailDesc" style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:16px"></p>

    <div class="detail-stage-row">
      <button class="stage-regress-btn" onclick="adjustStage(-1)">←</button>
      <button class="stage-advance-btn" onclick="adjustStage(1)" id="advanceBtn">Advance Stage →</button>
    </div>

    <div class="pipeline-detail" id="pipelineDetail"></div>

    <div class="notes-section" id="notesSection" style="display:none">
      <div class="notes-label">Notes</div>
      <div class="notes-display" id="detailNotes"></div>
    </div>

    <div class="modal-actions" style="margin-top:20px">
      <button class="btn btn-danger" onclick="deleteProject()">Delete</button>
      <button class="btn btn-secondary" onclick="editProject()">Edit</button>
      <button class="btn btn-primary" onclick="closeModal('detailModal')">Done</button>
    </div>
  </div>
</div>

<script>
const STAGES = [
  { label: 'Ideation', icon: '💡', short: 'Idea' },
  { label: 'Creation', icon: '🔨', short: 'Build' },
  { label: 'Integration', icon: '🔗', short: 'Integrate' },
  { label: 'Testing', icon: '🧪', short: 'Test' },
  { label: 'Refining', icon: '✨', short: 'Refine' },
];

let projects = [];
let currentFilter = 'all';
let selectedStage = 0;
let editingId = null;
let detailId = null;
let tags = [];

// ---- Storage ----
function save() { localStorage.setItem('skilllab', JSON.stringify(projects)); }
function load() {
  try { projects = JSON.parse(localStorage.getItem('skilllab') || '[]'); }
  catch { projects = []; }
  if (!projects.length) {
    projects = [
      { id: 1, name: 'RAG Pipeline Builder', desc: 'Build a retrieval-augmented generation pipeline with vector DB integration.', stage: 2, tags: ['python','langchain'], notes: 'Explore Chroma vs Pinecone.', created: Date.now() - 86400000 * 3 },
      { id: 2, name: 'Custom GPT for Code Review', desc: 'Fine-tune a model to review pull requests and suggest improvements.', stage: 1, tags: ['openai','fine-tune'], notes: '', created: Date.now() - 86400000 },
      { id: 3, name: 'Prompt Template Library', desc: 'A personal library of reusable prompt patterns with version tracking.', stage: 4, tags: ['prompting','ux'], notes: 'Consider markdown format.', created: Date.now() - 86400000 * 7 },
      { id: 4, name: 'AI Habit Tracker Agent', desc: 'An LLM agent that tracks habits and sends personalized nudges.', stage: 0, tags: ['agents','mobile'], notes: '', created: Date.now() },
    ];
    save();
  }
}

// ---- Render ----
function render() {
  renderStats();
  renderTabs();
  renderCards();
}

function renderStats() {
  const total = projects.length;
  const counts = STAGES.map((_, i) => projects.filter(p => p.stage === i).length);
  const bar = document.getElementById('statsBar');
  const colors = ['#9898c0','#a78bfa','#67e8f9','#6ee7b7','#fcd34d'];
  bar.innerHTML = `
    <div class="stat-chip"><span class="stat-dot" style="background:#4b4b6a"></span>${total} Total</div>
    ${STAGES.map((s,i) => counts[i] ? `<div class="stat-chip"><span class="stat-dot" style="background:${colors[i]}"></span>${counts[i]} ${s.short}</div>` : '').join('')}
  `;
}

function renderTabs() {
  const tabs = document.getElementById('filterTabs');
  const filters = [{ key:'all', label:'All' }, ...STAGES.map((s,i) => ({ key: String(i), label: s.icon + ' ' + s.short }))];
  tabs.innerHTML = filters.map(f => `
    <button class="tab ${currentFilter === f.key ? 'active' : ''}" onclick="setFilter('${f.key}')">${f.label}</button>
  `).join('');
}

function renderCards() {
  const filtered = currentFilter === 'all' ? projects : projects.filter(p => String(p.stage) === currentFilter);
  const container = document.getElementById('cardsContainer');
  const header = document.getElementById('sectionHeader');

  if (currentFilter === 'all') {
    header.textContent = `${filtered.length} project${filtered.length !== 1 ? 's' : ''}`;
  } else {
    const s = STAGES[parseInt(currentFilter)];
    header.textContent = `${s.icon} ${s.label} · ${filtered.length}`;
  }

  if (!filtered.length) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔭</div>
        <h3>Nothing here yet</h3>
        <p>Tap <strong>+</strong> to add your first AI skill or project</p>
      </div>`;
    return;
  }

  const sorted = [...filtered].sort((a,b) => b.created - a.created);
  container.innerHTML = sorted.map(p => renderCard(p)).join('');
}

function renderCard(p) {
  const pipes = STAGES.map((_, i) => {
    let cls = '';
    if (i < p.stage) cls = 'done';
    else if (i === p.stage) cls = 'active';
    return `<div class="pipe-step ${cls}"></div>${i < STAGES.length-1 ? '<div class="pipe-dot"></div>' : ''}`;
  }).join('');

  const tagHtml = p.tags?.length ? p.tags.slice(0,3).map(t => `<span class="tag">${t}</span>`).join('') : '';
  const date = new Date(p.created).toLocaleDateString('en-US', {month:'short', day:'numeric'});

  return `
    <div class="card" data-stage="${p.stage}" onclick="openDetail(${p.id})">
      <div class="card-top">
        <div class="card-title">${esc(p.name)}</div>
        <div class="stage-badge">${STAGES[p.stage].icon} ${STAGES[p.stage].short}</div>
      </div>
      ${p.desc ? `<div class="card-desc">${esc(p.desc.slice(0,90))}${p.desc.length > 90 ? '…' : ''}</div>` : ''}
      <div class="pipeline">${pipes}</div>
      <div class="card-meta">
        <div class="tags">${tagHtml}</div>
        <div class="card-date">${date}</div>
      </div>
    </div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---- Filters ----
function setFilter(key) {
  currentFilter = key;
  render();
}

// ---- Add Modal ----
function openAddModal() {
  editingId = null;
  tags = [];
  document.getElementById('modalTitle').textContent = 'New Skill / Project';
  document.getElementById('inputName').value = '';
  document.getElementById('inputDesc').value = '';
  document.getElementById('inputNotes').value = '';
  renderTagPills();
  selectStage(0);
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('inputName').focus(), 400);
}

function openEditModal(p) {
  editingId = p.id;
  tags = [...(p.tags || [])];
  document.getElementById('modalTitle').textContent = 'Edit Project';
  document.getElementById('inputName').value = p.name;
  document.getElementById('inputDesc').value = p.desc || '';
  document.getElementById('inputNotes').value = p.notes || '';
  renderTagPills();
  selectStage(p.stage);
  document.getElementById('addModal').classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target.classList.contains('modal-overlay')) {
    e.target.classList.remove('open');
  }
}

function selectStage(s) {
  selectedStage = s;
  document.querySelectorAll('.stage-opt').forEach(el => {
    el.classList.toggle('selected', parseInt(el.dataset.s) === s);
  });
}

document.querySelectorAll('.stage-opt').forEach(btn => {
  btn.addEventListener('click', () => selectStage(parseInt(btn.dataset.s)));
});

// Tags
document.getElementById('tagField').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    addTag(this.value.trim().replace(/,/g,''));
    this.value = '';
  } else if (e.key === 'Backspace' && !this.value && tags.length) {
    tags.pop();
    renderTagPills();
  }
});

function addTag(t) {
  if (t && !tags.includes(t) && tags.length < 6) {
    tags.push(t);
    renderTagPills();
  }
}

function removeTag(i) {
  tags.splice(i, 1);
  renderTagPills();
}

function renderTagPills() {
  const container = document.getElementById('tagsContainer');
  const field = document.getElementById('tagField');
  container.innerHTML = '';
  tags.forEach((t, i) => {
    const pill = document.createElement('div');
    pill.className = 'tag-pill';
    pill.innerHTML = `${esc(t)}<button onclick="removeTag(${i})">×</button>`;
    container.appendChild(pill);
  });
  container.appendChild(field);
}

function saveProject() {
  const name = document.getElementById('inputName').value.trim();
  if (!name) { document.getElementById('inputName').focus(); return; }

  if (editingId) {
    const p = projects.find(x => x.id === editingId);
    if (p) {
      p.name = name;
      p.desc = document.getElementById('inputDesc').value.trim();
      p.stage = selectedStage;
      p.tags = [...tags];
      p.notes = document.getElementById('inputNotes').value.trim();
    }
  } else {
    projects.push({
      id: Date.now(),
      name,
      desc: document.getElementById('inputDesc').value.trim(),
      stage: selectedStage,
      tags: [...tags],
      notes: document.getElementById('inputNotes').value.trim(),
      created: Date.now(),
    });
  }

  save();
  closeModal('addModal');
  render();
}

// ---- Detail Modal ----
function openDetail(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;
  detailId = id;

  document.getElementById('detailTitle').textContent = p.name;
  document.getElementById('detailDesc').textContent = p.desc || '';

  const badge = document.getElementById('detailBadge');
  badge.textContent = STAGES[p.stage].icon + ' ' + STAGES[p.stage].label;
  badge.style.cssText = '';

  document.getElementById('advanceBtn').disabled = p.stage >= STAGES.length - 1;
  document.getElementById('advanceBtn').textContent = p.stage >= STAGES.length - 1 ? '✓ Complete' : 'Advance Stage →';

  const pipeline = document.getElementById('pipelineDetail');
  pipeline.innerHTML = STAGES.map((s, i) => {
    let cls = i < p.stage ? 'done' : i === p.stage ? 'current' : '';
    let status = i < p.stage ? 'Complete' : i === p.stage ? 'In Progress' : 'Pending';
    return `
      <div class="pipe-detail-step ${cls}">
        <div class="pipe-icon">${s.icon}</div>
        <div class="pipe-step-name">${s.label}</div>
        <div class="pipe-step-status">${status}</div>
      </div>`;
  }).join('');

  const notes = document.getElementById('detailNotes');
  const notesSection = document.getElementById('notesSection');
  if (p.notes) {
    notes.textContent = p.notes;
    notesSection.style.display = 'block';
  } else {
    notesSection.style.display = 'none';
  }

  document.getElementById('detailModal').classList.add('open');
}

function adjustStage(delta) {
  const p = projects.find(x => x.id === detailId);
  if (!p) return;
  p.stage = Math.max(0, Math.min(STAGES.length - 1, p.stage + delta));
  save();
  openDetail(detailId);
  render();
}

function deleteProject() {
  if (!confirm('Delete this project?')) return;
  projects = projects.filter(x => x.id !== detailId);
  save();
  closeModal('detailModal');
  render();
}

function editProject() {
  const p = projects.find(x => x.id === detailId);
  if (!p) return;
  closeModal('detailModal');
  setTimeout(() => openEditModal(p), 200);
}

// ---- Init ----
load();
render();
</script>
</body>
</html>
